name: Repro Contract

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "repro/**"
      - "scripts/check_no_data_commit.py"
      - ".github/workflows/repro-contract.yml"
  pull_request:
    paths:
      - "repro/**"
      - "scripts/check_no_data_commit.py"
      - ".github/workflows/repro-contract.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python3 -m pip install jsonschema
      - run: python3 repro/validate_contract.py
      - run: python3 scripts/check_no_data_commit.py --all
