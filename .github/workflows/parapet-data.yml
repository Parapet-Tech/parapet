name: Parapet Data

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths: ["parapet-data/**", ".github/workflows/parapet-data.yml"]
  pull_request:
    paths: ["parapet-data/**", ".github/workflows/parapet-data.yml"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: parapet-data

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: parapet-data/pyproject.toml
      - run: 'python -m pip install --only-binary=:all: -e ".[dev]"'
      - run: 'python -c "import pandas, pyarrow; print(''pandas'', pandas.__version__); print(''pyarrow'', pyarrow.__version__)"'
      - run: pytest tests/ -q
