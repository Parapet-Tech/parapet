name: Python SDK Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "parapet-py/**"
      - "parapet/**"
      - ".github/workflows/py-sdk-wheels.yml"
  pull_request:
    paths:
      - "parapet-py/**"
      - "parapet/**"
      - ".github/workflows/py-sdk-wheels.yml"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: manylinux_2_17_x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_17"
            container: quay.io/pypa/manylinux2014_x86_64:latest
          - platform: manylinux_2_17_aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            manylinux: "2_17"
            container: quay.io/pypa/manylinux2014_aarch64:latest
          - platform: macosx_11_0_arm64
            os: macos-14
            target: aarch64-apple-darwin
            macosx_deployment_target: "11.0"
          - platform: macosx_10_12_x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            macosx_deployment_target: "10.12"
          - platform: win_amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Pre-pull manylinux image
        if: startsWith(matrix.platform, 'manylinux')
        shell: bash
        run: |
          for attempt in 1 2 3; do
            docker pull "${{ matrix.container }}" && exit 0
            sleep $((attempt * 20))
          done
          docker pull "${{ matrix.container }}"

      - name: Build manylinux wheel
        if: startsWith(matrix.platform, 'manylinux')
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          container: ${{ matrix.container }}
          before-script-linux: yum install -y openssl-devel perl-IPC-Cmd pkgconfig
          args: --release --out dist
          working-directory: parapet-py

      - name: Build macOS wheel
        if: startsWith(matrix.platform, 'macosx')
        uses: PyO3/maturin-action@v1
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: parapet-py

      - name: Build Windows wheel
        if: matrix.platform == 'win_amd64'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: parapet-py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: parapet-${{ matrix.platform }}-wheels
          path: parapet-py/dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish wheels to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Skip publish when PYPI_API_TOKEN is unavailable
        if: env.PYPI_API_TOKEN == ''
        run: echo "PYPI_API_TOKEN is not configured; skipping PyPI publish."

      - name: Publish wheels
        if: env.PYPI_API_TOKEN != ''
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ env.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*.whl
