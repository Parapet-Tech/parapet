# MirrorSpec v3 — v2 + TheWall staged sources (pilot)
#
# Delta from v2:
#   - RU attacks: +17K from russian_prompt_injections (4 reasons)
#   - RU benign: +37K from ru_turbo_saiga (3 reasons)
#   - ZH benign: +256K from stem_zh_instruction (2 reasons)
#   - AR benign: +10K from arabic-fine-tuning-chatML (3 reasons)
#
# Staged sources use label_filter on "reason" column to route to correct cells.
# Sources without staged data for a reason are unchanged from v2.
#
# Usage:
#   python -m parapet_data curate --spec mirror_spec_v3.yaml --output ./curated_v3/ --base-dir ..

name: mirror_v3
version: "3.0.0"
seed: 42

ratio: 1.0
total_target: 24000

backfill:
  strategy: ngram_safe
  log_gaps: true

language_quota:
  mode: best_effort
  profile:
    EN: 0.75
    RU: 0.10
    ZH: 0.08
    AR: 0.07

allow_partial_mirror: false

# ---------------------------------------------------------------------------
# Source inventory (v2 + staged)
# ---------------------------------------------------------------------------
#
# Attack sources per language:
#   EN: attacks_121624.yaml (108K EN) — the merged corpus
#   ZH: attacks_121624_zh.yaml (1K) + zh_attacks.yaml (34K)
#   AR: attacks_121624_ar.yaml (988) + ar_attacks.yaml (293)
#   RU: attacks_121624_ru.yaml (5.5K) + ru_attacks.yaml (2.8K)
#   RU (staged): ru_russian_prompt_injections_attacks_staged.yaml (17K, 4 reasons)
#
# Benign sources per language:
#   EN: global_benign_curated.yaml (200K)
#   ZH: wikipedia_zh (1.4K) + xquad_zh (240)
#   ZH (staged): zh_stem_zh_instruction_benign_staged.yaml (256K, 2 reasons)
#   AR: wikipedia_ar (1.3K) + xquad_ar (210)
#   AR (staged): ar_arabic-fine-tuning-chatML_benign_staged.yaml (10K, 3 reasons)
#   RU: wikipedia_ru (2K) + xquad_ru (300)
#   RU (staged): ru_ru_turbo_saiga_benign_staged.yaml (37K, 3 reasons)
# ---------------------------------------------------------------------------

