# v5 compact mirror spec — source-of-truth for all v5 tier specs.
#
# Usage:
#   python generate_spec.py mirror_v5.compact.yaml -o mirror_spec_v5_5k.yaml
#   python generate_spec.py mirror_v5.compact.yaml -o mirror_spec_v5_10k.yaml --total-target 10000
#   python generate_spec.py mirror_v5.compact.yaml -o mirror_spec_v5_19200.yaml --total-target 19200
#
# Design rules:
#   - enforce_source_contracts is ON: every source declares its contract
#   - cell attack_sources must be reason_grounded with mirror route_policy
#   - pooled attack sources (no reason column) go to supplements as residual
#   - supplement_ratio=0.0 per recovery plan ("no supplement budget reserved
#     for the primary recovery ladder"). Set >0 to enable residual pooled fill.
#
# Known gaps with enforcement:
#   - EN indirect_injection now has a dedicated LLMail-derived reason-specific file.
#   - ZH now has reviewed reason-grounded micro-sources for all 8 reasons.
#   - AR now has reviewed reason-grounded coverage for meta_probe,
#     adversarial_suffix (micro-source), and indirect_injection (micro-source).
#   - RU now has reviewed reason-grounded micro-sources for indirect_injection,
#     exfiltration, and meta_probe. RU constraint_bypass is the accepted miss.
#   - RU pooled attacks (8,335 rows) remain in supplements for residual fill.

name: mirror_v5
version: "5.0.0"
seed: 42
ratio: 1.0
total_target: 5000
allow_partial_mirror: false
enforce_source_contracts: true
supplement_ratio: 0.0

backfill:
  strategy: ngram_safe
  log_gaps: true

language_quota:
  mode: best_effort
  profile: {EN: 0.75, RU: 0.10, ZH: 0.08, AR: 0.07}

background:
  budget_fraction: 0.15
  sources:
    - {name: en_background_trivia_qa, path: schema/eval/staging/en_trivia-qa_benign_background_staged.yaml, language: EN, route_policy: background}
    - {name: en_background_wildchat, path: schema/eval/staging/en_WildChat-1M_benign_background_staged.yaml, language: EN, route_policy: background}
    - {name: en_background_writingprompts, path: schema/eval/staging/en_writingprompts_benign_background_staged.yaml, language: EN, route_policy: background}
    - {name: ar_background_arabguard, path: schema/eval/staging/ar_ArabGuard-Egyptian-V1_benign_background_staged.yaml, language: AR, route_policy: background}

# ---------------------------------------------------------------------------
# No base attack sources — pooled sources go to supplements.
# Only reason-grounded sources belong in cells (via extra_attack_sources
# and staged_attacks).
# ---------------------------------------------------------------------------

base_attack_sources: []

base_benign_sources:
  - {name: en_benign_curated, path: schema/eval/training/global_benign_curated.yaml, language: EN, max_samples: 20000, route_policy: mirror}
  - {name: zh_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_zh_benign.yaml, language: ZH, route_policy: mirror}
  - {name: zh_benign_xquad, path: schema/eval/benign/opensource_xquad_zh_benign.yaml, language: ZH, route_policy: mirror}
  - {name: ar_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_ar_benign.yaml, language: AR, route_policy: mirror}
  - {name: ar_benign_xquad, path: schema/eval/benign/opensource_xquad_ar_benign.yaml, language: AR, route_policy: mirror}
  - {name: ru_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_ru_benign.yaml, language: RU, route_policy: mirror}
  - {name: ru_benign_xquad, path: schema/eval/benign/opensource_xquad_ru_benign.yaml, language: RU, route_policy: mirror}

# ---------------------------------------------------------------------------
# Staged attack sources — reason-grounded, expand into matching cells
# ---------------------------------------------------------------------------

staged_attacks:
  ru_russian_prompt_injections:
    path: schema/eval/staging/ru_russian_prompt_injections_attacks_staged.yaml
    language: RU
    max_samples: 20000
    reasons: [instruction_override, roleplay_jailbreak, adversarial_suffix, obfuscation]
    grounding_mode: reason_grounded
    route_policy: mirror
    reason_provenance: source_label
    applicability_scope: in_domain
  ar_arabguard:
    path: schema/eval/staging/ar_ArabGuard-Egyptian-V1_attacks_staged.yaml
    language: AR
    reasons: [instruction_override, roleplay_jailbreak, exfiltration, indirect_injection, obfuscation, constraint_bypass]
    grounding_mode: reason_grounded
    route_policy: mirror
    reason_provenance: source_label
    applicability_scope: in_domain
  ar_swarm_reviewed:
    path: schema/eval/staging/ar_swarm_reviewed_attacks_staged.yaml
    language: AR
    reasons: [meta_probe]
    grounding_mode: reason_grounded
    route_policy: mirror
    reason_provenance: source_label
    applicability_scope: in_domain
  zh_swarm_reviewed:
    path: schema/eval/staging/zh_swarm_reviewed_attacks_staged.yaml
    language: ZH
    reasons: [instruction_override, indirect_injection, obfuscation]
    grounding_mode: reason_grounded
    route_policy: mirror
    reason_provenance: source_label
    applicability_scope: in_domain

# ---------------------------------------------------------------------------
# Staged EN benign — reason-filtered from multi-reason staged datasets
# ---------------------------------------------------------------------------

staged_benign_en:
  reasons: [roleplay_jailbreak, meta_probe, exfiltration, adversarial_suffix, indirect_injection, obfuscation, constraint_bypass]
  datasets:
    dolly:
      path: schema/eval/staging/en_databricks-dolly-15k_benign_staged.yaml
      route_policy: mirror
    codealpaca:
      path: schema/eval/staging/en_evol-codealpaca-v1_benign_staged.yaml
      route_policy: mirror
    writingprompts:
      path: schema/eval/staging/en_writingprompts_benign_staged.yaml
      route_policy: mirror
    wildchat:
      path: schema/eval/staging/en_WildChat-1M_benign_staged.yaml
      route_policy: mirror
    chatbot_arena:
      path: schema/eval/staging/en_chatbot_arena_conversations_benign_staged.yaml
      route_policy: mirror

# ---------------------------------------------------------------------------
# Staged multilingual benign — reason-filtered per language
# ---------------------------------------------------------------------------

staged_benign_multilingual:
  ru_turbo_saiga:
    path: schema/eval/staging/ru_ru_turbo_saiga_benign_staged.yaml
    language: RU
    max_samples: 20000
    reasons: [instruction_override, roleplay_jailbreak, meta_probe]
    route_policy: mirror
  zh_stem_instruction:
    path: schema/eval/staging/zh_stem_zh_instruction_benign_staged.yaml
    language: ZH
    max_samples: 20000
    reasons: [instruction_override, meta_probe]
    route_policy: mirror
  ar_arabic_chatml:
    path: schema/eval/staging/ar_arabic-fine-tuning-chatML_benign_staged.yaml
    language: AR
    reasons: [instruction_override, roleplay_jailbreak, meta_probe]
    route_policy: mirror

# ---------------------------------------------------------------------------
# Supplements — pooled attack sources, route_policy=residual.
# These do not count as mirror evidence. They contribute only when
# supplement_ratio > 0.
# ---------------------------------------------------------------------------

supplements:
  - name: pooled_en_attacks
    weakness: EN pooled attack inventory for residual-only experiments
    max_samples: 20000
    attack_sources:
      - name: en_attacks_merged
        path: schema/eval/malicious/attacks_121624.yaml
        language: EN
        max_samples: 20000
        label_filter: {column: label, allowed: [malicious]}
        route_policy: residual
        grounding_mode: pooled
        reason_provenance: none
        applicability_scope: in_domain
    benign_sources: []
  - name: pooled_multilingual_attacks
    weakness: Multilingual attack coverage for ungrounded language families (ZH fully pooled, AR/RU partially pooled)
    max_samples: 50000
    attack_sources:
      - {name: zh_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_zh.yaml, language: ZH, route_policy: residual, grounding_mode: pooled, reason_provenance: none, applicability_scope: unknown}
      - {name: zh_attacks_novel, path: schema/eval/training/multilingual/zh_attacks.yaml, language: ZH, route_policy: residual, grounding_mode: pooled, reason_provenance: none, applicability_scope: unknown}
      - {name: ar_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_ar.yaml, language: AR, route_policy: residual, grounding_mode: pooled, reason_provenance: none, applicability_scope: unknown}
      - {name: ar_attacks_novel, path: schema/eval/training/multilingual/ar_attacks.yaml, language: AR, route_policy: residual, grounding_mode: pooled, reason_provenance: none, applicability_scope: unknown}
      - {name: ru_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_ru.yaml, language: RU, route_policy: residual, grounding_mode: pooled, reason_provenance: none, applicability_scope: unknown}
      - {name: ru_attacks_novel, path: schema/eval/training/multilingual/ru_attacks.yaml, language: RU, route_policy: residual, grounding_mode: pooled, reason_provenance: none, applicability_scope: unknown}
    benign_sources: []

# ---------------------------------------------------------------------------
# Cells — only reason-grounded attack sources in extra_attack_sources.
# Staged attacks expand automatically via the staged_attacks section.
# ---------------------------------------------------------------------------

cells:
  instruction_override:
    teaching_goal: "Neutralize 'text mentioning instructions = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.7, structured: 0.2, code: 0.1}
    length: {short: 0.5, medium: 0.3, long: 0.2}
    extra_attack_sources:
      - name: en_instruction_override
        path: schema/eval/malicious/instruction_override_attacks.yaml
        language: EN
        route_policy: mirror
        grounding_mode: reason_grounded
        reason_provenance: manual_map
        applicability_scope: in_domain
      - name: zh_instruction_override_micro
        path: schema/eval/staging/zh_instruction_override_micro_attacks_staged.yaml
        language: ZH
        route_policy: mirror
        grounding_mode: reason_grounded
        reason_provenance: adjudicated
        applicability_scope: in_domain

