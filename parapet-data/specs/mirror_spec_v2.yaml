# MirrorSpec v2 — Multilingual 32-cell experiment
#
# 8 reasons x 4 languages = 32 logical cells
# Tier 1: 24K (12K attack + 12K benign)
# Language quota: EN 75% / RU 10% / ZH 8% / AR 7%
# Backfill: ngram_safe (language-priority)
#
# Usage:
#   python -m parapet_data curate --spec mirror_spec_v2.yaml --output ./curated_v2/ --base-dir ..

name: mirror_v2
version: "2.0.0"
seed: 42

ratio: 1.0
total_target: 24000

backfill:
  strategy: ngram_safe
  log_gaps: true

language_quota:
  mode: best_effort
  profile:
    EN: 0.75
    RU: 0.10
    ZH: 0.08
    AR: 0.07

allow_partial_mirror: false

# ---------------------------------------------------------------------------
# Shared source definitions (YAML anchors to avoid repetition)
# ---------------------------------------------------------------------------
#
# Attack sources per language:
#   EN: attacks_121624.yaml (108K EN) — the merged corpus
#   ZH: attacks_121624_zh.yaml (1K from corpus) + zh_attacks.yaml (34K novel)
#   AR: attacks_121624_ar.yaml (988 from corpus) + ar_attacks.yaml (293 novel)
#   RU: attacks_121624_ru.yaml (5.5K from corpus) + ru_attacks.yaml (2.8K novel)
#
# Benign sources per language:
#   EN: global_benign_curated.yaml (200K)
#   ZH: wikipedia_zh (1.4K) + xquad_zh (240)
#   AR: wikipedia_ar (1.3K) + xquad_ar (210)
#   RU: wikipedia_ru (2K) + xquad_ru (300)
# ---------------------------------------------------------------------------

cells:
  - reason: instruction_override
    teaching_goal: "Neutralize 'text mentioning instructions = attack' correlation across EN/RU/ZH/AR"
    languages: [EN, RU, ZH, AR]
    format_distribution:
      prose: 0.7
      structured: 0.2
      code: 0.1
    length_distribution:
      short: 0.5
      medium: 0.3
      long: 0.2
    attack_sources:
      # EN — merged corpus (primary EN pool)
      - name: en_attacks_merged
        path: schema/eval/malicious/attacks_121624.yaml
        language: EN
        extractor: col_content
        label_filter:
          column: label
          allowed: [malicious]
      # EN — reason-specific boost
      - name: en_instruction_override
        path: schema/eval/malicious/instruction_override_attacks.yaml
        language: EN
        extractor: col_content
      # ZH
