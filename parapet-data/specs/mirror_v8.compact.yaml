# v8 compact mirror spec — 2:1 hard-negative benign ratio.
#
# Derived from v7 with two changes:
#   1. ratio raised from 1.0 to 2.0 (2:1 benign:attack per cell)
#   2. discussion_benign renamed to hard_negative_benign, budget raised
#      from 5% to 35%, sources expanded to cover the measured FPR families
#
# Why:
#   Benign ratio sweep (2026-04-15) proved that hard-negative benign
#   composition is the primary lever for reducing false positives.
#   2:1-H halved FPR from 23.6% to 11.6% on the clean challenge set.
#   Composition mattered more than volume (2:1-M barely moved FPR).
#
# Usage:
#   python generate_spec.py mirror_v8.compact.yaml -o mirror_spec_v8.yaml
#
# Design rules (inherited from v7):
#   - enforce_source_contracts is ON
#   - cell attack_sources must be reason_grounded with mirror route_policy
#   - pooled attack sources admitted via heuristic routing
#   - supplement_ratio=0.0
#
# Known gaps:
#   - RU constraint_bypass is the accepted miss
#   - hard_negative_benign sources are EN-only; multilingual hard negatives
#     would further reduce per-language FPR

name: mirror_v8
version: "8.0.0"
seed: 42
ratio: 2.0
total_target: 35000
allow_partial_mirror: false
enforce_source_contracts: true
allow_heuristic_mirror_attacks: true
supplement_ratio: 0.05

backfill:
  strategy: ngram_safe
  log_gaps: true

language_quota:
  mode: best_effort
  profile: {EN: 0.50, RU: 0.25, ZH: 0.10, AR: 0.15}

background:
  budget_fraction: 0.15
  sources:
    - {name: en_background_trivia_qa, path: schema/eval/staging/en_trivia-qa_benign_background_staged.jsonl, language: EN, route_policy: background}
    - {name: en_background_wildchat, path: schema/eval/staging/en_WildChat-1M_benign_background_staged.jsonl, language: EN, route_policy: background}
    - {name: en_background_writingprompts, path: schema/eval/staging/en_writingprompts_benign_background_staged.jsonl, language: EN, route_policy: background}
    - {name: ar_background_arabguard, path: schema/eval/staging/ar_ArabGuard-Egyptian-V1_benign_background_staged.jsonl, language: AR, route_policy: background}

# ---------------------------------------------------------------------------
# Hard-negative benign (using the discussion_benign lane).
#
# Despite the schema name, this lane now serves a broader role: hard-negative
# benign content that triggers false positives. The benign ratio sweep proved
# this is the primary lever for reducing FPR (composition > volume).
#
# Budget is 35% of the benign allocation. At ratio=2.0, this means roughly
# 35% of 2x the attack count goes to hard negatives.
#
# Sources:
#   - notinject: explicitly not-injection content that shares trigger words
#   - wildguardmix: safety-topic benign (largest volume hard-negative family)
#   - atlas_neg: adversarial NLI negatives
#   - bipia: indirect prompt injection benign pairs
#   - wildjailbreak: attack-adjacent creative writing
#   - broad staged benign: diverse instructional/conversational text
#
# TODO: rename schema field from discussion_benign to hard_negative_benign
# when not blocking other work. The behavioral change is already here.
# ---------------------------------------------------------------------------

discussion_benign:
  budget_fraction: 0.35
  sources:
    - {name: en_hn_notinject, path: schema/eval/benign/opensource_notinject_benign.jsonl, language: EN, route_policy: discussion_benign}
    - {name: en_hn_wildguardmix, path: schema/eval/benign/opensource_wildguardmix_benign.jsonl, language: EN, route_policy: discussion_benign}
    - {name: en_hn_atlas_neg, path: schema/eval/benign/thewall_atlas_neg.jsonl, language: EN, route_policy: discussion_benign}
    - {name: en_hn_bipia, path: schema/eval/benign/opensource_bipia_benign.jsonl, language: EN, route_policy: discussion_benign}
    - {name: en_hn_wildjailbreak, path: schema/eval/staging/en_wildjailbreak_benign_staged.jsonl, language: EN, route_policy: discussion_benign}
    - {name: en_hn_wildchat, path: schema/eval/staging/en_WildChat-1M_benign_staged.jsonl, language: EN, route_policy: discussion_benign}
    - {name: en_hn_dolly, path: schema/eval/staging/en_databricks-dolly-15k_benign_staged.jsonl, language: EN, route_policy: discussion_benign}
    - {name: en_hn_spml, path: schema/eval/staging/en_SPML_Chatbot_Prompt_Injection_benign_staged.jsonl, language: EN, route_policy: discussion_benign}

# ---------------------------------------------------------------------------
# No base attack sources — pooled sources go to supplements.
# Only reason-grounded sources belong in cells (via extra_attack_sources
# and staged_attacks).
# ---------------------------------------------------------------------------

base_attack_sources:
  # Mirror cells consume preclassified rows directly — classify_reason is no
  # longer invoked at curate time. ``reason_provenance: heuristic_staged``
  # signals to the sampler that ``row["reason"]`` is authoritative. Rebuild
  # via ``python -m parapet_data preclassify-reasons --spec ...`` whenever
  # the classifier or upstream sources change.
  - name: en_attacks_merged
    path: schema/eval/heuristic_staged/en_en_attacks_merged_heuristic_staged.jsonl
    language: EN
    max_samples: 20000
    label_filter: {column: label, allowed: [malicious]}
    route_policy: mirror
    grounding_mode: reason_grounded
    reason_provenance: heuristic_staged
    applicability_scope: in_domain
  - {name: zh_attacks_corpus, path: schema/eval/heuristic_staged/zh_zh_attacks_corpus_heuristic_staged.jsonl, language: ZH, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic_staged, applicability_scope: in_domain}
  - {name: zh_attacks_novel, path: schema/eval/heuristic_staged/zh_zh_attacks_novel_heuristic_staged.jsonl, language: ZH, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic_staged, applicability_scope: in_domain}
  - {name: ar_attacks_corpus, path: schema/eval/heuristic_staged/ar_ar_attacks_corpus_heuristic_staged.jsonl, language: AR, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic_staged, applicability_scope: in_domain}
  - {name: ar_attacks_novel, path: schema/eval/heuristic_staged/ar_ar_attacks_novel_heuristic_staged.jsonl, language: AR, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic_staged, applicability_scope: in_domain}
  - {name: ru_attacks_corpus, path: schema/eval/heuristic_staged/ru_ru_attacks_corpus_heuristic_staged.jsonl, language: RU, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic_staged, applicability_scope: in_domain}
  - {name: ru_attacks_novel, path: schema/eval/heuristic_staged/ru_ru_attacks_novel_heuristic_staged.jsonl, language: RU, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic_staged, applicability_scope: in_domain}

base_benign_sources:
  - {name: en_benign_curated, path: schema/eval/training/global_benign_curated.jsonl, language: EN, max_samples: 20000, route_policy: mirror}
  - {name: zh_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_zh_benign.jsonl, language: ZH, route_policy: mirror}
  - {name: zh_benign_xquad, path: schema/eval/benign/opensource_xquad_zh_benign.jsonl, language: ZH, route_policy: mirror}
  - {name: ar_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_ar_benign.jsonl, language: AR, route_policy: mirror}
  - {name: ar_benign_xquad, path: schema/eval/benign/opensource_xquad_ar_benign.jsonl, language: AR, route_policy: mirror}
  - {name: ru_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_ru_benign.jsonl, language: RU, route_policy: mirror}
  - {name: ru_benign_xquad, path: schema/eval/benign/opensource_xquad_ru_benign.jsonl, language: RU, route_policy: mirror}

