# v6 compact mirror spec — harness-era sensor freeze seed.
#
# Derived from v6 with two deliberate changes:
#   1. total_target raised to 35K
#   2. language_quota shifted toward the highest-ROI multilingual slices:
#      {EN:0.50, RU:0.25, ZH:0.10, AR:0.15}
#
# Usage:
#   python generate_spec.py mirror_v7.compact.yaml -o mirror_spec_v7_35k.yaml
#   python generate_spec.py mirror_v7.compact.yaml -o mirror_spec_v7_10k.yaml --total-target 10000
#
# Design rules (inherited from v5):
#   - enforce_source_contracts is ON: every source declares its contract
#   - cell attack_sources must be reason_grounded with mirror route_policy
#   - pooled attack sources are admitted into mirror via heuristic per-cell
#     routing (`reason_provenance: heuristic`)
#   - supplement_ratio=0.0: no residual supplement budget reserved in v7
#
# What changed from v6:
#   - total_target rises from 25K to 35K
#   - RU quota increases from 0.15 to 0.25 because supply is abundant and
#     Phase 2 showed strong marginal value for RU_attack
#   - AR quota increases from 0.12 to 0.15 because AR_attack also showed
#     strong marginal value and still has remaining headroom
#   - ZH quota drops from 0.13 to 0.10 because Phase 2 showed weaker gains
#   - EN quota drops from 0.60 to 0.50, but absolute EN budget still grows
#     from 15.0K to 17.5K
#
# Known gaps carried from v6:
#   - RU constraint_bypass is the accepted miss (no reason-grounded source)
#   - discussion_benign data not yet staged — see TODO below

name: mirror_v7
version: "7.0.0"
seed: 42
ratio: 1.0
total_target: 35000
allow_partial_mirror: false
enforce_source_contracts: true
allow_heuristic_mirror_attacks: true
supplement_ratio: 0.0

backfill:
  strategy: ngram_safe
  log_gaps: true

language_quota:
  mode: best_effort
  profile: {EN: 0.50, RU: 0.25, ZH: 0.10, AR: 0.15}

background:
  budget_fraction: 0.15
  sources:
    - {name: en_background_trivia_qa, path: schema/eval/staging/en_trivia-qa_benign_background_staged.yaml, language: EN, route_policy: background}
    - {name: en_background_wildchat, path: schema/eval/staging/en_WildChat-1M_benign_background_staged.yaml, language: EN, route_policy: background}
    - {name: en_background_writingprompts, path: schema/eval/staging/en_writingprompts_benign_background_staged.yaml, language: EN, route_policy: background}
    - {name: ar_background_arabguard, path: schema/eval/staging/ar_ArabGuard-Egyptian-V1_benign_background_staged.yaml, language: AR, route_policy: background}

# ---------------------------------------------------------------------------
# Discussion-benign — benign content with attack-adjacent lexical patterns.
#
# Purpose: security blog posts, CTF writeups, PI research discussion, red-team
# post-mortems, and chat messages that quote or discuss attack techniques
# without executing them. Training on this family is a lexical-coverage fix
# so discussed attacks land in the ambiguous band (harness-routable), not the
# high-confidence attack zone.
#
# Measurement: explicit FPR on a held-out discussion_benign eval slice,
# reported separately from general benign FPR.
#
# TODO: Source and stage real discussion_benign data. Candidates:
#   - Security StackExchange / InfoSec blog posts discussing injection
#   - CTF challenge writeups (PI-themed)
#   - Academic papers on prompt injection (abstracts + excerpts)
#   - Red-team post-mortems that quote attack payloads in context
#   - wildjailbreak benign is a partial proxy (attack-structured framing,
#     benign intent) but not the real thing — it tests jailbreak-adjacent
#     creative writing, not security discussion.
#
# Until real sources are staged, wildjailbreak benign serves as the
# placeholder for structural validation of the discussion_benign lane.
# ---------------------------------------------------------------------------

discussion_benign:
  budget_fraction: 0.05
  sources:
    # Placeholder: wildjailbreak benign has attack-adjacent lexical patterns
    # but is creative writing, not security discussion. Replace with real
    # discussion_benign sources when staged.
    - {name: en_discussion_wildjailbreak_proxy, path: schema/eval/staging/en_wildjailbreak_benign_staged.yaml, language: EN, route_policy: discussion_benign}

# ---------------------------------------------------------------------------
# No base attack sources — pooled sources go to supplements.
# Only reason-grounded sources belong in cells (via extra_attack_sources
# and staged_attacks).
# ---------------------------------------------------------------------------

base_attack_sources:
  - name: en_attacks_merged
    path: schema/eval/malicious/attacks_121624.yaml
    language: EN
    max_samples: 20000
    label_filter: {column: label, allowed: [malicious]}
    route_policy: mirror
    grounding_mode: reason_grounded
    reason_provenance: heuristic
    applicability_scope: in_domain
  - {name: zh_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_zh.yaml, language: ZH, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic, applicability_scope: in_domain}
  - {name: zh_attacks_novel, path: schema/eval/training/multilingual/zh_attacks.yaml, language: ZH, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic, applicability_scope: in_domain}
  - {name: ar_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_ar.yaml, language: AR, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic, applicability_scope: in_domain}
  - {name: ar_attacks_novel, path: schema/eval/training/multilingual/ar_attacks.yaml, language: AR, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic, applicability_scope: in_domain}
  - {name: ru_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_ru.yaml, language: RU, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic, applicability_scope: in_domain}
  - {name: ru_attacks_novel, path: schema/eval/training/multilingual/ru_attacks.yaml, language: RU, route_policy: mirror, grounding_mode: reason_grounded, reason_provenance: heuristic, applicability_scope: in_domain}

base_benign_sources:
  - {name: en_benign_curated, path: schema/eval/training/global_benign_curated.yaml, language: EN, max_samples: 20000, route_policy: mirror}
  - {name: zh_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_zh_benign.yaml, language: ZH, route_policy: mirror}
  - {name: zh_benign_xquad, path: schema/eval/benign/opensource_xquad_zh_benign.yaml, language: ZH, route_policy: mirror}
  - {name: ar_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_ar_benign.yaml, language: AR, route_policy: mirror}
  - {name: ar_benign_xquad, path: schema/eval/benign/opensource_xquad_ar_benign.yaml, language: AR, route_policy: mirror}
  - {name: ru_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_ru_benign.yaml, language: RU, route_policy: mirror}
  - {name: ru_benign_xquad, path: schema/eval/benign/opensource_xquad_ru_benign.yaml, language: RU, route_policy: mirror}

