# ---------------------------------------------------------------------------
# Supplements — pooled attack sources, route_policy=residual.
# These do not count as mirror evidence. They contribute only when
# supplement_ratio > 0.
# ---------------------------------------------------------------------------


# ---------------------------------------------------------------------------
