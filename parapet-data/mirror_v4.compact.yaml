# Source-locked v4 evidence spec.
#
# This is intentionally a near-copy of mirror_v3.compact.yaml.
# v4 is the v3 composition with cleaned data from the same source family,
# not a new architecture or source-inventory experiment.
#
# Usage:
#   python generate_spec.py mirror_v4.compact.yaml -o mirror_spec_v4_19k.yaml
#
# Rules for this spec:
#   - keep the same source families as v3_19k
#   - allow pipeline/staging fixes to clean those sources
#   - do not silently replace source inventories here

name: mirror_v4
version: "4.0.0"
seed: 42
ratio: 1.0
total_target: 19200
allow_partial_mirror: false

backfill:
  strategy: ngram_safe
  log_gaps: true

language_quota:
  mode: best_effort
  profile: {EN: 0.75, RU: 0.10, ZH: 0.08, AR: 0.07}

background:
  budget_fraction: 0.15
  sources:
    - {name: en_background_trivia_qa, path: schema/eval/staging/en_trivia-qa_benign_background_staged.yaml, language: EN}
    - {name: en_background_wildchat, path: schema/eval/staging/en_WildChat-1M_benign_background_staged.yaml, language: EN}
    - {name: en_background_writingprompts, path: schema/eval/staging/en_writingprompts_benign_background_staged.yaml, language: EN}
    - {name: ar_background_arabguard, path: schema/eval/staging/ar_ArabGuard-Egyptian-V1_benign_background_staged.yaml, language: AR}

# ---------------------------------------------------------------------------
# Source pools — intentionally unchanged from v3
# ---------------------------------------------------------------------------

base_attack_sources:
  - {name: en_attacks_merged, path: schema/eval/malicious/attacks_121624.yaml, language: EN, label_filter: {column: label, allowed: [malicious]}}
  - {name: zh_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_zh.yaml, language: ZH}
  - {name: zh_attacks_novel, path: schema/eval/training/multilingual/zh_attacks.yaml, language: ZH}
  - {name: ar_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_ar.yaml, language: AR}
  - {name: ar_attacks_novel, path: schema/eval/training/multilingual/ar_attacks.yaml, language: AR}
  - {name: ru_attacks_corpus, path: schema/eval/training/multilingual/attacks_121624_ru.yaml, language: RU}
  - {name: ru_attacks_novel, path: schema/eval/training/multilingual/ru_attacks.yaml, language: RU}

base_benign_sources:
  - {name: en_benign_curated, path: schema/eval/training/global_benign_curated.yaml, language: EN}
  - {name: zh_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_zh_benign.yaml, language: ZH}
  - {name: zh_benign_xquad, path: schema/eval/benign/opensource_xquad_zh_benign.yaml, language: ZH}
  - {name: ar_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_ar_benign.yaml, language: AR}
  - {name: ar_benign_xquad, path: schema/eval/benign/opensource_xquad_ar_benign.yaml, language: AR}
  - {name: ru_benign_wikipedia, path: schema/eval/benign/opensource_wikipedia_ru_benign.yaml, language: RU}
  - {name: ru_benign_xquad, path: schema/eval/benign/opensource_xquad_ru_benign.yaml, language: RU}

staged_attacks:
  ru_russian_prompt_injections:
    path: schema/eval/staging/ru_russian_prompt_injections_attacks_staged.yaml
    language: RU
    reasons: [instruction_override, roleplay_jailbreak, adversarial_suffix, obfuscation]

staged_benign_en:
  reasons: [roleplay_jailbreak, meta_probe, exfiltration, adversarial_suffix, indirect_injection, obfuscation, constraint_bypass]
  datasets:
    dolly:
      path: schema/eval/staging/en_databricks-dolly-15k_benign_staged.yaml
    codealpaca:
      path: schema/eval/staging/en_evol-codealpaca-v1_benign_staged.yaml
    writingprompts:
      path: schema/eval/staging/en_writingprompts_benign_staged.yaml
    wildchat:
      path: schema/eval/staging/en_WildChat-1M_benign_staged.yaml
    chatbot_arena:
      path: schema/eval/staging/en_chatbot_arena_conversations_benign_staged.yaml

staged_benign_multilingual:
  ru_turbo_saiga:
    path: schema/eval/staging/ru_ru_turbo_saiga_benign_staged.yaml
    language: RU
    reasons: [instruction_override, roleplay_jailbreak, meta_probe]
  zh_stem_instruction:
    path: schema/eval/staging/zh_stem_zh_instruction_benign_staged.yaml
    language: ZH
    reasons: [instruction_override, meta_probe]
  ar_arabic_chatml:
    path: schema/eval/staging/ar_arabic-fine-tuning-chatML_benign_staged.yaml
    language: AR
    reasons: [instruction_override, roleplay_jailbreak, meta_probe]

cells:
  instruction_override:
    teaching_goal: "Neutralize 'text mentioning instructions = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.7, structured: 0.2, code: 0.1}
    length: {short: 0.5, medium: 0.3, long: 0.2}
    extra_attack_sources:
      - {name: en_instruction_override, path: schema/eval/malicious/instruction_override_attacks.yaml, language: EN}

  roleplay_jailbreak:
    teaching_goal: "Neutralize 'roleplay/character language = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.8, structured: 0.1, code: 0.1}
    length: {short: 0.3, medium: 0.4, long: 0.3}
    extra_attack_sources:
      - {name: en_roleplay_jailbreak, path: schema/eval/malicious/roleplay_jailbreak_attacks.yaml, language: EN}

  meta_probe:
    teaching_goal: "Neutralize 'questions about the system = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.8, structured: 0.1, code: 0.1}
    length: {short: 0.6, medium: 0.3, long: 0.1}
    extra_attack_sources:
      - {name: en_meta_probe, path: schema/eval/malicious/meta_probe_attacks.yaml, language: EN}

  exfiltration:
    teaching_goal: "Neutralize 'requesting data output = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.6, structured: 0.3, code: 0.1}
    length: {short: 0.5, medium: 0.3, long: 0.2}
    extra_attack_sources:
      - {name: en_exfiltration, path: schema/eval/malicious/exfiltration_attacks.yaml, language: EN}

  adversarial_suffix:
    teaching_goal: "Neutralize 'high-entropy/garbled text = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.4, structured: 0.2, code: 0.4}
    length: {short: 0.3, medium: 0.4, long: 0.3}
    extra_benign_sources:
      - {name: en_benign_code, path: schema/eval/benign/code_samples.yaml, language: EN}

  indirect_injection:
    teaching_goal: "Neutralize 'embedded instructions in context = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.5, structured: 0.4, code: 0.1}
    length: {short: 0.2, medium: 0.4, long: 0.4}

  obfuscation:
    teaching_goal: "Neutralize 'base64/ROT13/encoded text = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.3, structured: 0.4, code: 0.3}
    length: {short: 0.4, medium: 0.4, long: 0.2}
    extra_attack_sources:
      - {name: en_obfuscation, path: schema/eval/malicious/obfuscation_attacks.yaml, language: EN}

  constraint_bypass:
    teaching_goal: "Neutralize 'requests to ignore rules = attack' correlation across EN/RU/ZH/AR"
    format: {prose: 0.8, structured: 0.1, code: 0.1}
    length: {short: 0.5, medium: 0.3, long: 0.2}
    extra_attack_sources:
      - {name: en_constraint_bypass, path: schema/eval/malicious/constraint_bypass_attacks.yaml, language: EN}
