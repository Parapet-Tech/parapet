# TrainConfig — iteration mode (fast feedback)
#
# Used with: python -m parapet_runner.runner run \
#   --curation-manifest ../parapet-data/curated/manifest.json \
#   --train-config configs/iteration_v1.yaml \
#   --output-dir ./runs/mirror_v1_iter1

specialist: generalist
mode: iteration

# Feature extraction
analyzer: char_wb
ngram_min: 3
ngram_max: 5
max_features: 10000    # iteration cap: <= 15000
min_df: 5

# SVM
c: 0.1
class_weight: none
max_iter: 100000

# Cross-validation (0 = skip for speed)
cv_folds: 0
cv_max_samples: 120000

# Threshold
threshold_policy: fixed
threshold_value: -0.5

# Pruning
prune_threshold: 0.05

seed: 42
